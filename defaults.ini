; ============================================
; Omnix Configuration
; ============================================

[Discord]
; Your Discord bot token - Get this from https://discord.com/developers/applications
; Replace YOUR_DISCORD_TOKEN_HERE with your actual bot token
token = YOUR_DISCORD_TOKEN_HERE

; Command prefix for bot commands (e.g., ~ping, ~help)
; Can be any character or string
prefix = ~

; ============================================
; Persistence Cog - Saves user data when they leave/rejoin
; ============================================
[Persistence]
; Enable or disable the entire persistence cog
enabled = true

; Save and restore user nicknames when they rejoin the server
nicknames = true

; Save and restore user roles when they rejoin the server
roles = true

; ============================================
; Soundboard Cog - Audio playback functionality
; ============================================
; Note: Sound files should be placed in resources/sounds/raw/
;       Supported format: .mp3
[Soundboard]
; Enable or disable the entire soundboard cog
enabled = true

; Target volume in decibels full scale (dBFS)
; Range: -60 (quieter) to 0 (louder)
; Recommended: -36 is a good balance
target_dbfs = -36

; Add the ids of the user you would like to allow to add sounds to the soundboard
; EXAMPLE: 2534675,534246,24537
whitelist =

; ============================================
; Custom Names for Soundboard Sounds
; ============================================

; FORMAT: sound file's name = preferred button name
; EXAMPLES:
; airhorn = 📯 AIRHORN 📯
; epic = 🔥 EPIC SOUND 🔥
[SoundboardCustomNames]
; Add your custom sound mappings below this line
